<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Liquidez · Simple</title>
<style>
  :root{ --bg:#0a0e17; --panel:#0f1522; --panel2:#111a2b; --border:#1e2a3f;
    --txt:#e6edf6; --muted:#7d8ca5; --accent:#37c0ff; --up:#26d67c; --down:#ff5b6e; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100vh;}
  header{display:flex;align-items:center;gap:5px;padding:4px 8px;flex-wrap:nowrap;overflow:hidden;
    background:var(--panel);border-bottom:1px solid var(--border);}
  .brand{font-weight:700;font-size:11px;line-height:1.1;flex:0 0 auto;white-space:nowrap;} .brand span{color:var(--accent);}
  .lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
  select,button.pill{background:var(--panel2);color:var(--txt);border:1px solid var(--border);
    border-radius:5px;padding:3px 6px;font-size:10.5px;cursor:pointer;font-weight:600;white-space:nowrap;}
  #cryptoSel option,#indexSel option{background:var(--panel2);color:var(--txt);}
  #cryptoSel,#indexSel{min-width:78px;}
  #confSel{max-width:104px;}
  #symInput{background:var(--panel2);color:var(--txt);border:1px solid var(--border);
    border-radius:5px;padding:3px 6px;font-size:11px;font-weight:700;width:62px;text-transform:uppercase;}
  #symInput:focus{outline:none;border-color:var(--accent);}
  button.pill{color:var(--muted);}
  button.pill:hover{border-color:#33465f;color:var(--txt);}
  button.pill.on{background:var(--accent);color:#04121d;border-color:var(--accent);}
  .grp{display:flex;gap:3px;align-items:center;flex:0 0 auto;}
  .stats{margin-left:auto;display:flex;gap:9px;align-items:center;font-size:10px;flex:0 0 auto;}
  .stat b{display:block;font-size:13px;line-height:1.1;} .stat small{color:var(--muted);font-size:8px;text-transform:uppercase;}
  #price b{color:var(--accent);}
  #status{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--muted);white-space:nowrap;}
  .dot{width:8px;height:8px;border-radius:50%;background:#ffb020;}
  .dot.ok{background:var(--up);} .dot.err{background:var(--down);}
  main{flex:1;position:relative;} canvas{display:block;width:100%;height:100%;touch-action:none;}
  #lsbar{display:flex;align-items:center;justify-content:center;gap:14px;padding:5px 14px;
    background:var(--panel);border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap;}
  #lsbar .lslabel{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
  #lsbar .lsflow{font-size:10.5px;font-weight:600;color:var(--muted);}
  #lsbar .lswrap{flex:0 0 300px;height:17px;border-radius:9px;overflow:hidden;display:flex;
    background:#141d2c;border:1px solid var(--border);}
  #lsbar .lslong{flex-basis:0;flex-grow:1;background:linear-gradient(90deg,#0c4d31,#26d67c);
    display:flex;align-items:center;justify-content:flex-end;padding-right:7px;
    color:#eafff5;font-weight:700;font-size:10.5px;overflow:hidden;}
  #lsbar .lsshort{flex-basis:0;flex-grow:1;background:linear-gradient(90deg,#ff5b6e,#5c1f28);
    display:flex;align-items:center;padding-left:7px;color:#ffeaed;font-weight:700;font-size:10.5px;overflow:hidden;}
  #lsbar .lsv{color:var(--muted);font-size:11px;}
  #lsbar .lsv b{font-weight:700;} #lsbar .up{color:var(--up);} #lsbar .dn{color:var(--down);}
  #lsSkew{font-weight:700;}
  #legend{position:absolute;left:12px;top:10px;background:rgba(6,10,18,.75);
    padding:7px 10px;border-radius:7px;font-size:10.5px;color:#c7d3e3;pointer-events:none;}
  #legend .bar{width:130px;height:8px;border-radius:2px;margin:4px 0 3px;
    background:linear-gradient(90deg,#101828,#1a5a68,#2ab5a5,#8fd46e,#ffe15a);}
  #legend .ends{display:flex;justify-content:space-between;color:var(--muted);font-size:9.5px;}
  #colorctl{position:absolute;top:78px;left:12px;display:flex;align-items:center;gap:7px;
    background:rgba(6,10,18,.72);padding:4px 9px;border-radius:6px;font-size:9.5px;
    color:#8393ab;z-index:5;text-transform:uppercase;letter-spacing:.4px;}
  #colorctl input{width:120px;accent-color:#37c0ff;cursor:pointer;}
  #targets{position:absolute;top:10px;right:8px;width:218px;z-index:5;
    background:rgba(8,12,20,.92);border:1px solid #263650;border-radius:8px;
    padding:6px 8px;font-size:11px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);}
  #targets .tt{font-size:9px;color:#7d8ca5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
  #targets .cp{color:#37c0ff;font-weight:700;margin-bottom:5px;font-size:12px;
    border-bottom:1px solid #1e2a3f;padding-bottom:4px;}
  #targets .row{display:flex;align-items:center;gap:5px;padding:2px 0;}
  #targets .row.main{background:rgba(255,150,30,.14);border-radius:5px;padding:3px 4px;margin:1px -4px;}
  #targets .rk{width:15px;height:15px;border-radius:50%;background:#1e2a3f;color:#c7d3e3;
    font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  #targets .row.main .rk{background:#ff9c2e;color:#1a0f00;}
  #targets .ar{font-size:10px;width:10px;flex:0 0 auto;}
  #targets .ar.up,#targets .ds.up{color:#26d67c;} #targets .ar.dn,#targets .ds.dn{color:#ff5b6e;}
  #targets .pr{font-weight:700;color:#e6edf6;min-width:52px;}
  #targets .am{color:#ffd75c;font-weight:600;min-width:46px;}
  #targets .ds{margin-left:auto;font-size:10px;font-weight:600;}
  #tip{position:absolute;pointer-events:none;display:none;z-index:6;
    background:rgba(9,14,22,.97);border:1px solid #2a3a54;border-radius:9px;
    padding:9px 12px;font-size:11.5px;white-space:nowrap;box-shadow:0 6px 22px rgba(0,0,0,.7);min-width:150px;}
  #tip .tp{font-weight:700;font-size:13px;margin-bottom:6px;color:#ffd75c;
    border-bottom:1px solid #223349;padding-bottom:4px;}
  #tip .tr{display:flex;justify-content:space-between;gap:16px;padding:2px 0;}
  #tip .tr small{color:#8393ab;} #tip .tr b{font-weight:700;}
  .note{position:absolute;left:12px;bottom:6px;font-size:10px;color:#4d5b70;pointer-events:none;}

  /* ---- TABLET: la cabecera se reorganiza en dos líneas ---- */
  @media (max-width:1100px){
    header{flex-wrap:wrap;gap:4px;padding:4px 6px;}
    .stats{margin-left:auto;}
    #targets{width:180px;font-size:10px;top:6px;right:4px;}
    #targets .pr{min-width:44px;} #targets .am{min-width:38px;}
    #colorctl{top:70px;}
    .note{display:none;}
  }
  /* ---- MÓVIL: controles compactos, paneles reducidos ---- */
  @media (max-width:700px){
    header{gap:3px;padding:3px 4px;}
    .brand{display:none;}
    .lbl{display:none;}
    select,button.pill{padding:4px 6px;font-size:11px;}
    #symInput{width:56px;font-size:11px;}
    #indexSel{min-width:60px;} #confSel{max-width:78px;}
    .stats{gap:6px;} .stat b{font-size:12px;}
    #status span:last-child{display:none;}
    #lsbar{padding:3px 6px;gap:7px;font-size:10px;}
    #lsbar .lswrap{flex:1 1 120px;height:14px;}
    #lsbar .lslabel,#lsbar .lsflow{display:none;}
    #legend{left:6px;top:6px;padding:5px 7px;font-size:9px;}
    #legend .bar{width:90px;}
    #colorctl{top:62px;left:6px;padding:3px 6px;}
    #colorctl input{width:80px;}
    #colorctl span{display:none;}
    #targets{width:150px;font-size:9.5px;padding:4px 5px;top:4px;right:3px;}
    #targets .tt{display:none;}
    #targets .pr{min-width:38px;} #targets .am{min-width:32px;}
    #targets .row:nth-child(n+7){display:none;}   /* solo 5 objetivos en móvil */
    #tip{font-size:10.5px;padding:7px 9px;min-width:120px;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">Mapa<span>Liq</span></div>
    <div class="grp"><input id="symInput" list="symList" placeholder="BTC" autocomplete="off" title="Escribe el par y pulsa Enter"><datalist id="symList"></datalist></div>
    <div class="grp"><select id="indexSel" title="Índices"></select></div>
    <div class="grp"><span class="lbl">TF</span><select id="tfSel"></select></div>
    <div class="grp" id="levs"><span class="lbl">Apal</span></div>
    <button class="pill on" id="candleBtn" title="Velas">🕯</button>
    <button class="pill" id="cleanBtn" title="Modo limpio: oculta zonas y deja solo velas + muros">🧹</button>
    <button class="pill on" id="heatmapBtn" title="Oculta el mapa de calor de liquidez estimada (fondo)">🌡</button>
    <button class="pill on" id="macroBtn" title="Zonas de temporalidad mayor (4h/1d)">🟣</button>
    <button class="pill on" id="oiBtn" title="Pondera por Open Interest real">📈</button>
    <button class="pill on" id="bookBtn" title="Muros REALES del libro de órdenes (ballenas)">🐋</button>
    <div class="grp"><span class="lbl">Muro ≥</span>
      <select id="bookUsdSel" title="Tamaño mínimo del muro en USD">
        <option value="100000">$100K</option>
        <option value="250000">$250K</option>
        <option value="500000">$500K</option>
        <option value="1000000">$1M</option>
        <option value="2000000">$2M</option>
        <option value="5000000">$5M</option>
        <option value="10000000">$10M</option>
        <option value="15000000">$15M</option>
        <option value="20000000">$20M</option>
        <option value="25000000">$25M</option>
        <option value="50000000">$50M</option>
        <option value="100000000">$100M</option>
        <option value="200000000">$200M</option>
      </select>
    </div>
    <button class="pill on" id="reactBtn" title="Zonas donde el precio ya rechazó antes (liquidez probada)">⟲</button>
    <button class="pill on" id="heatBtn" title="Zonas de calor: liquidez institucional agrupada (SHORT arriba / LONG abajo)">🔥</button>
    <div class="grp"><span class="lbl">Confl</span>
      <select id="confSel" title="Cuántas señales deben coincidir">
        <option value="3">Las 3</option>
        <option value="2">2 de 3</option>
        <option value="poc">+POC</option>
        <option value="macro">+4h</option>
        <option value="off">Off</option>
      </select>
    </div>
    <button class="pill on" id="vpBtn" title="Perfil de volumen real (VRVP)">📊</button>
    <div class="grp"><span class="lbl">Filas</span>
      <button class="pill" id="rowMinus" style="padding:3px 6px;">−</button>
      <span id="rowVal" style="font-size:10px;color:var(--accent);font-weight:700;min-width:28px;text-align:center;">2000</span>
      <button class="pill" id="rowPlus" style="padding:3px 6px;">+</button>
    </div>
    <button class="pill" id="refreshBtn" title="Recargar">⟳</button>
    <div class="stats">
      <div class="stat" id="price"><small id="psym">BTC</small><b>—</b></div>
      <div id="status"><span class="dot" id="sdot"></span><span id="stxt">iniciando…</span></div>
    </div>
  </header>
  <div id="lsbar">
    <span class="lslabel" id="lsLabel">Largo / Corto · vol. taker</span>
    <span class="lsflow" id="lsFlow"></span>
    <div class="lswrap">
      <div class="lslong" id="lsLong">—</div>
      <div class="lsshort" id="lsShort">—</div>
    </div>
    <span class="lsv">Largo <b class="up" id="lsLongVal">—</b></span>
    <span class="lsv">Corto <b class="dn" id="lsShortVal">—</b></span>
    <span class="lsv" id="lsSkew"></span>
  </div>
  <main>
    <canvas id="cv"></canvas>
    <div id="legend">
      <div>Liquidez por precio</div>
      <div class="bar"></div>
      <div class="ends"><span>poca</span><span>mucha (imán)</span></div>
    </div>
    <div id="colorctl">
      <span>resaltar</span>
      <input id="gammaSlider" type="range" min="1" max="3" step="0.1">
      <span>desvanecer</span>
    </div>
    <div id="targets"></div>
    <div id="tip"></div>
    <div class="note">Heatmap = liquidez estimada · Panel derecho VRVP = volumen REAL negociado (POC en ámbar) · Binance Futures</div>
  </main>
</div>
<script>
function SAVED_G(){ try{ return (JSON.parse(localStorage.getItem("mapaSimple")||"{}")).gamma; }catch(e){ return null; } }
const CONFIG={
  groups:{
    "Cripto":["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","DOGEUSDT","ADAUSDT","AVAXUSDT",
              "LINKUSDT","DOTUSDT","LTCUSDT","BCHUSDT","NEARUSDT","MATICUSDT","UNIUSDT","ICPUSDT",
              "APTUSDT","ATOMUSDT","XLMUSDT","ETCUSDT","FILUSDT","HBARUSDT","ARBUSDT","OPUSDT",
              "SUIUSDT","INJUSDT","TONUSDT","TIAUSDT","RENDERUSDT","IMXUSDT","STXUSDT","GRTUSDT",
              "AAVEUSDT","MKRUSDT","ALGOUSDT","QNTUSDT","SANDUSDT","AXSUSDT","EGLDUSDT","FTMUSDT",
              "THETAUSDT","FLOWUSDT","XTZUSDT","CHZUSDT","LDOUSDT","CRVUSDT","SNXUSDT","COMPUSDT",
              "ENAUSDT","SEIUSDT","PENDLEUSDT","JUPUSDT","WLDUSDT","ONDOUSDT","ENSUSDT","DYDXUSDT",
              "GALAUSDT","MANAUSDT","ZECUSDT","1INCHUSDT","KSMUSDT","BATUSDT","ZRXUSDT","ENJUSDT",
              "YFIUSDT","SUSHIUSDT","DASHUSDT","WAVESUSDT","IOTAUSDT","NEOUSDT","CELOUSDT","ROSEUSDT",
              "KAVAUSDT","ZILUSDT","GMXUSDT","APEUSDT","LRCUSDT","BALUSDT","STORJUSDT","CVXUSDT",
              "FXSUSDT","RUNEUSDT","WOOUSDT","FLOKIUSDT","JASMYUSDT","OCEANUSDT","API3USDT","BLURUSDT",
              "MASKUSDT","ANKRUSDT","CTSIUSDT","SKLUSDT","BANDUSDT","ARUSDT","MINAUSDT","GMTUSDT",
              "SSVUSDT","METISUSDT","ASTRUSDT","SFPUSDT"],
    "Índices":["XAUUSDT","XAGUSDT","CLUSDT","BZUSDT","NATGASUSDT"],
  },
  tfs:["5m","15m","1h","4h","1d"],
  limitByTf:{"5m":288,"15m":288,"1h":240,"4h":180,"1d":180},
  levs:[10,25,50,100],
  rows:220, gamma:(SAVED_G()||1.5), topN:8, openFrac:0.02,
  rest:"https://fapi.binance.com/fapi/v1/klines",
  oiHist:"https://fapi.binance.com/futures/data/openInterestHist",
  depth:"https://fapi.binance.com/fapi/v1/depth",   // libro de órdenes REAL (muros)
  ws:"wss://fstream.binance.com/stream?streams=",
  // ventana exacta del ratio L/S por TF: [intervalo, nº velas]
  lsPoll:{ "5m":["1m",5], "15m":["1m",15], "1h":["1m",60], "4h":["5m",48], "1d":["15m",96] },
  // temporalidad mayor (macro) a superponer según el TF actual
  htfFor:{ "5m":"4h", "15m":"4h", "1h":"4h", "4h":"1d", "1d":null },
  // duración de cada vela en ms (para la cuenta atrás)
  tfMs:{ "5m":300000, "15m":900000, "1h":3600000, "4h":14400000, "1d":86400000 },
};
const SAVED=(()=>{ try{return JSON.parse(localStorage.getItem("mapaSimple")||"{}");}catch(e){return {};} })();
const state={ symbol:SAVED.symbol||"BTCUSDT", tf:SAVED.tf||"15m", levs:[25,50,100], showCandles:true,
  candles:[], grid:null, gridMax:1, profile:null, zones:[],
  lo:0, hi:1, bucket:1, livePrice:null, ws:null, hover:null, layout:null, need:false,
  viewLo:null, viewHi:null, x0:null, x1:null, userZoom:false,
  lsBuy:0, lsSell:0, lsAt:0, lsLive:false, lastWsMsg:0,
  showHTF:true, htfZones:[], htfTf:null, useOI:true, confMode:(SAVED.confMode||"3"),
  bookWalls:[], showBook:true, bookTracked:[], bookErr:null, bookMinUsd:(SAVED.bookMinUsd||1000000),
  depthWs:null, depthBook:{bids:new Map(), asks:new Map()},   // libro completo acumulado por WS   // muro ≥ X USD
  reactZones:[], showReact:true,  // zonas donde el precio YA reaccionó (liquidez probada)
  heatZones:[], showHeat:true, showZones:true, cleanMode:false, showHeatmap:true,    // ZONAS DE CALOR + modo limpio + heatmap de fondo
  vp:null, vpMax:1, vpPoc:0, vpRows:2000, showVP:true };   // VRVP superpuesto
const $=s=>document.querySelector(s);
const cv=$("#cv"), ctx=cv.getContext("2d");
const buf=[document.createElement("canvas"),document.createElement("canvas")];
const bx=[buf[0].getContext("2d"),buf[1].getContext("2d")];
let cur=0, staticCv=null;
const SYMNM={PAXGUSDT:"Oro (PAXG)",WBTCUSDT:"WBTC"};
const nm=s=>SYMNM[s]||s.replace("USDT","");
const fmt=n=>n>=1000?n.toLocaleString("en-US",{maximumFractionDigits:0}):n.toFixed(n<10?4:2);
const usd=n=>"$"+(n>=1e9?(n/1e9).toFixed(2)+"B":n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(0)+"K":n.toFixed(0));

/* ---- UI ---- */
function buildUI(){
  const inp=$("#symInput"), dl=$("#symList"), ix=$("#indexSel");
  // llena el datalist con todos los pares cripto (para autocompletar al escribir)
  (CONFIG.groups["Cripto"]||[]).forEach(s=>{const o=document.createElement("option");o.value=nm(s);dl.appendChild(o);});
  // selector de índices aparte
  const phI=document.createElement("option"); phI.value=""; phI.textContent="Índices…"; phI.disabled=true;
  ix.appendChild(phI);
  (CONFIG.groups["Índices"]||[]).forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=nm(s);ix.appendChild(o);});
  // estado inicial
  const esIndice=(CONFIG.groups["Índices"]||[]).includes(state.symbol);
  if(esIndice){ ix.value=state.symbol; inp.value=""; } else { inp.value=nm(state.symbol); ix.value=""; }
  $("#psym").textContent=nm(state.symbol);
  // al escribir un par y pulsar Enter (o elegir del autocompletar): normaliza a XXXUSDT
  const aplicarSym=()=>{
    let v=inp.value.trim().toUpperCase().replace(/\s/g,"");
    if(!v) return;
    if(!v.endsWith("USDT")) v=v+"USDT";
    state.symbol=v; ix.value=""; $("#psym").textContent=nm(v);
    inp.value=nm(v); savePrefs(); reload();
  };
  inp.onchange=aplicarSym;
  inp.onkeydown=e=>{ if(e.key==="Enter") aplicarSym(); };
  // al hacer clic: borra el par actual para escribir otro directamente (y muestra la lista)
  inp.onfocus=()=>{ inp.dataset.prev=inp.value; inp.value=""; };
  // si sale sin escribir nada, recupera el par que había
  inp.onblur=()=>{ if(!inp.value.trim() && inp.dataset.prev) inp.value=inp.dataset.prev; };
  ix.onchange=()=>{ state.symbol=ix.value; inp.value=""; $("#psym").textContent=nm(ix.value); savePrefs(); reload(); };
  const ts=$("#tfSel");
  CONFIG.tfs.forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;ts.appendChild(o);});
  ts.value=state.tf; ts.onchange=()=>{state.tf=ts.value;savePrefs();reloadTf();};
  const lc=$("#levs");
  CONFIG.levs.forEach(L=>{
    const b=document.createElement("button"); b.className="pill"+(state.levs.includes(L)?" on":"");
    b.textContent=L+"x";
    b.onclick=()=>{ if(state.levs.includes(L)){ if(state.levs.length>1) state.levs=state.levs.filter(x=>x!==L); }
      else state.levs.push(L);
      b.classList.toggle("on",state.levs.includes(L)); compute(); render(); };
    lc.appendChild(b);
  });
  $("#candleBtn").onclick=e=>{ state.showCandles=!state.showCandles;
    e.target.classList.toggle("on",state.showCandles); render(); };
  $("#cleanBtn").onclick=e=>{
    state.cleanMode=!state.cleanMode;
    e.target.classList.toggle("on",state.cleanMode);
    // en modo limpio oculta zonas, calor, reacción, macro; deja velas, muros, POC
    const off=state.cleanMode;
    state.showHeat=!off; state.showReact=!off; state.showHTF=!off; state.showZones=!off;
    // sincroniza los botones visualmente
    ["heatBtn","reactBtn","macroBtn"].forEach(id=>{ const b=$("#"+id); if(b) b.classList.toggle("on",!off); });
    render();
  };
  $("#heatmapBtn").onclick=e=>{ state.showHeatmap=!state.showHeatmap;
    e.target.classList.toggle("on",state.showHeatmap); render(); };
  $("#macroBtn").onclick=e=>{ state.showHTF=!state.showHTF;
    e.target.classList.toggle("on",state.showHTF);
    if(state.showHTF) fetchHtf().then(render); else { state.htfZones=[]; render(); } };
  $("#oiBtn").onclick=e=>{ state.useOI=!state.useOI;
    e.target.classList.toggle("on",state.useOI);
    fetchOI().then(()=>{ compute(); render(); }); };
  $("#bookBtn").onclick=e=>{ state.showBook=!state.showBook;
    e.target.classList.toggle("on",state.showBook);
    if(state.showBook) fetchBook().then(render); else { state.bookWalls=[]; render(); } };
  const bu=$("#bookUsdSel");
  bu.value=String(state.bookMinUsd);
  bu.onchange=()=>{ state.bookMinUsd=+bu.value; savePrefs();
    state.bookTracked=[]; procesarBook(); render(); };   // re-filtra al instante, sin pedir a Binance
  $("#reactBtn").onclick=e=>{ state.showReact=!state.showReact;
    e.target.classList.toggle("on",state.showReact); render(); };
  $("#heatBtn").onclick=e=>{ state.showHeat=!state.showHeat;
    e.target.classList.toggle("on",state.showHeat); render(); };
  const cf=$("#confSel");
  cf.value=state.confMode;
  cf.onchange=()=>{ state.confMode=cf.value; savePrefs(); render(); };
  $("#vpBtn").onclick=e=>{ state.showVP=!state.showVP;
    e.target.classList.toggle("on",state.showVP); render(); };
  const setRows=v=>{ state.vpRows=Math.max(50,Math.min(5000,v));
    $("#rowVal").textContent=state.vpRows; render(); };
  $("#rowMinus").onclick=()=>setRows(state.vpRows-250);
  $("#rowPlus").onclick=()=>setRows(state.vpRows+250);
  $("#refreshBtn").onclick=()=>reload();
  // control de contraste del heatmap (resaltar ↔ desvanecer)
  const gs=$("#gammaSlider");
  if(gs){ gs.value=CONFIG.gamma;
    gs.oninput=()=>{ CONFIG.gamma=+gs.value; savePrefs(); render(); }; }
}
const setStatus=(t,c)=>{$("#stxt").textContent=t;$("#sdot").className="dot"+(c?" "+c:"");};
function savePrefs(){ try{ localStorage.setItem("mapaSimple",
  JSON.stringify({symbol:state.symbol, tf:state.tf, confMode:state.confMode, bookMinUsd:state.bookMinUsd, gamma:CONFIG.gamma})); }catch(e){} }

/* ---- DATOS ---- */
async function fetchData(){
  const lim=CONFIG.limitByTf[state.tf]||240;
  const r=await fetch(`${CONFIG.rest}?symbol=${state.symbol}&interval=${state.tf}&limit=${lim}`);
  if(!r.ok) throw new Error("klines "+r.status);
  const raw=await r.json();
  state.candles=raw.map(k=>({t:k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],q:+k[7],tb:+k[10],oiUp:1}));
  state.livePrice=state.candles[state.candles.length-1].c;
  state.klineIv=state.tf;
  await fetchOI();
}

/* ---- OPEN INTEREST: peso extra a velas donde entró OI nuevo (dinero real) ---- */
async function fetchOI(){
  if(!state.useOI){ state.candles.forEach(k=>k.oiUp=1); return; }
  const oiPeriod={ "5m":"5m","15m":"15m","1h":"1h","4h":"4h","1d":"1d" }[state.tf]||"1h";
  try{
    const r=await fetch(`${CONFIG.oiHist}?symbol=${state.symbol}&period=${oiPeriod}&limit=500`);
    if(!r.ok) return;
    const raw=await r.json();
    if(!raw.length) return;
    const oiT=raw.map(o=>o.timestamp), oiV=raw.map(o=>+o.sumOpenInterest);
    // para cada vela, halla el OI del momento más cercano
    const oiVals=state.candles.map(k=>{
      let best=null,bd=Infinity;
      for(let j=0;j<oiT.length;j++){ const d=Math.abs(oiT[j]-k.t); if(d<bd){bd=d;best=oiV[j];} }
      return best;
    });
    for(let i=1;i<state.candles.length;i++){
      const cur=oiVals[i], prev=oiVals[i-1];
      if(cur==null||prev==null||prev<=0){ state.candles[i].oiUp=1; continue; }
      const delta=(cur-prev)/prev;
      state.candles[i].oiUp = delta>0 ? Math.min(1+delta*8, 2.5) : 1;   // OI creciente, acotado a 2.5x
    }
  }catch(e){}
}

/* ---- WEBSOCKET DE PROFUNDIDAD: mantiene el libro COMPLETO (rango amplio, como Coinglass) ---- */
function connectDepthWs(){
  if(state.depthWs){ try{state.depthWs.onclose=null; state.depthWs.close();}catch(e){} }
  state.depthBook={bids:new Map(), asks:new Map()};
  const s=state.symbol.toLowerCase();
  // stream de profundidad: actualizaciones incrementales del libro completo
  const ws=new WebSocket(`wss://fstream.binance.com/stream?streams=${s}@depth@500ms`);
  state.depthWs=ws;
  ws.onmessage=e=>{
    let msg; try{ msg=JSON.parse(e.data); }catch(_){ return; }
    const d=msg.data; if(!d) return;
    // aplica las actualizaciones al libro acumulado (b=bids, a=asks)
    for(const [p,q] of (d.b||[])){ const price=+p, qty=+q;
      if(qty===0) state.depthBook.bids.delete(price); else state.depthBook.bids.set(price,qty); }
    for(const [p,q] of (d.a||[])){ const price=+p, qty=+q;
      if(qty===0) state.depthBook.asks.delete(price); else state.depthBook.asks.set(price,qty); }
    state.depthLastMsg=Date.now();
  };
  ws.onclose=()=>{ if(state.depthWs!==ws) return; state.depthWs=null; setTimeout(connectDepthWs,2500); };
}

/* ---- LIBRO DE ÓRDENES REAL: trae el libro y guarda las zonas crudas ---- */
async function fetchBook(){
  if(!state.showBook){ state.bookWalls=[]; return; }
  try{
    let bids, asks;
    // PREFERIR el libro completo del WebSocket (rango amplio, como Coinglass)
    const wsBids=state.depthBook.bids, wsAsks=state.depthBook.asks;
    if(wsBids.size>50 && wsAsks.size>50){
      bids=[...wsBids].map(([price,qty])=>({price,qty,side:"bid"}));
      asks=[...wsAsks].map(([price,qty])=>({price,qty,side:"ask"}));
      state.bookErr=null;
    } else {
      // respaldo: REST (rango corto ±0.5%) mientras el WS llena el libro
      const r=await fetch(`${CONFIG.depth}?symbol=${state.symbol}&limit=1000`);
      if(!r.ok){ state.bookErr="HTTP "+r.status; state.bookWalls=[]; return; }
      const d=await r.json();
      bids=(d.bids||[]).map(x=>({price:+x[0], qty:+x[1], side:"bid"}));
      asks=(d.asks||[]).map(x=>({price:+x[0], qty:+x[1], side:"ask"}));
      state.bookErr=null;
    }
    const all=[...bids,...asks].filter(o=>o.qty>0);
    if(!all.length){ state.bookErr="libro vacío"; state.bookWalls=[]; return; }
    const price=state.livePrice||all[0].price;

    // binSize FIJO por par → los muros no se mueven de nivel
    if(!state.bookBin || state.bookBinSym!==state.symbol){
      state.bookBin = price*0.0015; state.bookBinSym=state.symbol;
    }
    const binSize=state.bookBin;
    const zonasMap=new Map();
    for(const o of all){
      const bin=Math.round(o.price/binSize);
      const key=o.side+"_"+bin;
      if(!zonasMap.has(key)) zonasMap.set(key,{price:bin*binSize, qty:0, side:o.side, ordenes:0});
      const z=zonasMap.get(key);
      z.qty+=o.qty; z.ordenes++;
    }
    // guarda las zonas crudas + rango del libro (para re-filtrar al instante al cambiar umbral)
    state.bookRaw=[...zonasMap.values()];
    const precios=all.map(o=>o.price);
    state.bookLo=Math.min(...precios); state.bookHi=Math.max(...precios);
    procesarBook();
  }catch(e){ state.bookErr="sin conexión (libro)"; state.bookWalls=[]; }
}

/* ---- procesa las zonas crudas según el umbral (instantáneo, sin pedir a Binance) ---- */
function procesarBook(){
  const zonas=state.bookRaw; if(!zonas||!zonas.length) return;
  const price=state.livePrice||0;
  const minUsd=state.bookMinUsd||1000000;
  const detectados=zonas
    .map(z=>({price:z.price, qty:z.qty, side:z.side, usd:z.qty*z.price, ordenes:z.ordenes}))
    .filter(z=>z.usd>=minUsd);

  const tol=price*0.0018;
  const bookLo=state.bookLo, bookHi=state.bookHi;
  const tracked=state.bookTracked||[];

  // 1) actualiza los muros que ya seguíamos
  for(const t of tracked){
    const m=detectados.find(z=>z.side===t.side && Math.abs(z.price-t.price)<=tol);
    if(m){ t.qty=m.qty; t.usd=m.usd; t.ordenes=m.ordenes; t.missed=0; }  // actualiza tamaño, NO el precio (queda fijo)
    else {
      const dentroRango = t.price>=bookLo && t.price<=bookHi;
      if(dentroRango) t.missed += 0.34;   // sigue en rango pero encogió: aguanta
      else t.missed += 0.15;              // fuera del rango del libro: aguanta más
    }
    // MITIGADO: el precio ha ATRAVESADO el muro → consumido, fuera al instante
    t.mitigado = (t.side==="bid" && price < t.price - tol) || (t.side==="ask" && price > t.price + tol);
  }
  // 2) añade muros nuevos (solo los que superan el umbral)
  for(const z of detectados){
    if(!tracked.find(t=>t.side===z.side && Math.abs(z.price-t.price)<=tol))
      tracked.push({...z, missed:0, mitigado:false});
  }
  // 3) SOLO se quita si: el precio lo mitigó, O lleva mucho ausente (retirado de verdad)
  state.bookTracked=tracked.filter(t=> !t.mitigado && t.missed<10);
  // 4) muestra los vigentes
  state.bookWalls=state.bookTracked
    .map(t=>({price:t.price, qty:t.qty, side:t.side, usd:t.usd, ordenes:t.ordenes}))
    .sort((a,b)=>b.usd-a.usd)
    .slice(0,10);
  if(!state.bookWalls.length) state.bookErr="sin muros ≥ "+usd(state.bookMinUsd||1000000);
}

/* ---- MODELO: liquidez estimada por nivel de precio ---- */
function compute(){
  const c=state.candles; if(!c.length) return;
  const N=c.length, R=CONFIG.rows, levs=state.levs;
  let lo=Infinity,hi=-Infinity;
  for(const k of c){ if(k.l<lo)lo=k.l; if(k.h>hi)hi=k.h;
    for(const L of levs){ const a=k.c*(1-1/L), b=k.c*(1+1/L); if(a<lo)lo=a; if(b>hi)hi=b; } }
  const pad=(hi-lo)*0.01; lo-=pad; hi+=pad;
  const bucket=(hi-lo)/R, rowOf=p=>{const r=Math.floor((p-lo)/bucket);return (r<0||r>=R)?-1:r;};
  const grid=Array.from({length:N},()=>new Float64Array(R));
  let live=[];
  // MODELO PRECISO (igual que el mapa Coinglass): reparto real por apalancamiento
  // + solo una fracción del volumen abre posición. Esto da zonas más nítidas.
  const LEVSHARE={10:0.35, 25:0.30, 50:0.22, 100:0.13};
  const OF=CONFIG.openFrac;
  for(let i=0;i<N;i++){
    const k=c[i], keep=[];
    for(const a of live){
      if(a.p>=k.l && a.p<=k.h){ if(a.r>=0) for(let j=a.s;j<=i;j++) grid[j][a.r]+=a.v; }   // liquidada
      else keep.push(a);
    }
    live=keep;
    let lf=(k.q>0)?(k.tb||0)/k.q:0.5; lf=Math.max(0,Math.min(1,lf));
    const oiW=Math.min(k.oiUp||1, 3.5);                  // peso OI acotado (equilibrio: destaca sin aplastar)
    const nuevo=k.q*OF*oiW;                              // volumen ponderado por OI (acotado)
    for(const L of levs){
      const share=LEVSHARE[L]||0.25;
      const dl=k.c*(1-1/L), sl=k.c*(1+1/L);
      live.push({r:rowOf(dl),p:dl,v:nuevo*lf*share,s:i});
      live.push({r:rowOf(sl),p:sl,v:nuevo*(1-lf)*share,s:i});
    }
  }
  for(const a of live){ if(a.r>=0) for(let j=a.s;j<N;j++) grid[j][a.r]+=a.v; }

  // el precio actual consume la liquidez que ya atravesó (zonas más limpias, como Coinglass)
  const lp=state.livePrice, lastK=c[N-1];
  if(lp){ const hiNow=Math.max(lastK.h,lp), loNow=Math.min(lastK.l,lp);
    for(let r=0;r<R;r++){ const p=lo+(r+0.5)*bucket;
      if(p>=loNow && p<=hiNow){ for(let i=0;i<N;i++) grid[i][r]=0; } }   // barrida
  }
  const prof=new Float64Array(R); let gmax=0;
  for(let r=0;r<R;r++){ let m=0; for(let i=0;i<N;i++){const v=grid[i][r]; if(v>m)m=v;} prof[r]=m; if(m>gmax)gmax=m; }

  // NORMALIZACIÓN POR PERCENTIL (como el mapa original): hace que las zonas fuertes
  // salgan AMARILLAS de verdad, en vez de que solo la máxima destaque.
  const vals=[];
  for(let i=0;i<N;i++) for(let r=0;r<R;r++){ const v=grid[i][r]; if(v>0) vals.push(v); }
  vals.sort((a,b)=>a-b);
  const pN = vals.length? vals[Math.floor(vals.length*0.96)] : 1;   // percentil 96
  Object.assign(state,{grid,gridMax:pN||gmax||1,profile:prof,lo,hi,bucket});

  // velas visibles: ancho objetivo ~7px por vela, con hueco a la derecha
  if(state.x0==null){
    const px=(cv.clientWidth*0.74)-10;
    const nn=Math.max(40, Math.min(N, Math.round(px/7)));
    const pad=Math.round(nn*0.12);        // ~12% de hueco a la derecha (la vela actual no pegada al borde)
    state.x1=N-1+pad; state.x0=state.x1-nn;
    if(state.x0<0) state.x0=0;
  }
  state.x1=Math.min(state.x1, N-1+Math.round((state.x1-state.x0)*0.15));
  if(state.x0>=state.x1) state.x0=Math.max(0,state.x1-30);

  // vista vertical: ceñida al rango de las velas VISIBLES (con más margen para centrar)
  if(!state.userZoom||state.viewLo==null){
    const i0=Math.max(0,Math.floor(state.x0)), i1=Math.min(N-1,Math.ceil(state.x1));
    let cl=Infinity, ch=-Infinity;
    for(let i=i0;i<=i1;i++){ if(c[i].l<cl)cl=c[i].l; if(c[i].h>ch)ch=c[i].h; }
    const rng=(ch-cl)||ch*0.01, mg=rng*0.38;   // más margen arriba/abajo = velas centradas
    state.viewLo=cl-mg; state.viewHi=ch+mg;
  }

  // calcula el volumen real (VRVP) ANTES de las zonas, para reforzarlas con dato duro
  computeVP();
  // zonas dentro del rango visible
  computeZones(prof, gmax, lo, bucket, R);
  // zonas donde el precio YA reaccionó (liquidez probada por el mercado)
  computeReactZones();
  // ZONAS DE CALOR: fusiona todas las señales en niveles institucionales fuertes
  computeHeatZones();
}

/* ---- ZONAS DE CALOR: agrupa toda la liquidez (estimada + real) en niveles fundamentales ---- */
function computeHeatZones(){
  const c=state.candles, N=c.length; if(!N){ state.heatZones=[]; return; }
  const price=state.livePrice||c[N-1].c;
  const tol=price*0.0025;   // 0.25%: niveles dentro de esta distancia = misma zona

  // recolecta TODAS las señales con un peso base según su fiabilidad
  const señales=[];
  // zonas estimadas (peso por fuerza)
  (state.zones||[]).forEach(z=> señales.push({price:z.price, peso:1.0*(z.confirmada?1.5:1), tipo:"liq"}));
  // POC = volumen real (peso alto, es dato duro)
  if(state.vp&&state.vpBk){ const poc=state.vpLo+(state.vpPoc+0.5)*state.vpBk;
    señales.push({price:poc, peso:2.0, tipo:"poc"}); }
  // reacciones probadas (peso por nº de toques)
  (state.reactZones||[]).forEach(z=> señales.push({price:z.price, peso:1.3*(1+(z.toques-1)*0.3), tipo:"react"}));
  // muros reales del libro (peso alto, liquidez real puesta)
  (state.bookWalls||[]).forEach(w=> señales.push({price:w.price, peso:1.8, tipo:"muro"}));
  // zonas macro 4h (peso alto, temporalidad mayor)
  (state.htfZones||[]).forEach(z=> señales.push({price:z.price, peso:1.6, tipo:"macro"}));

  if(!señales.length){ state.heatZones=[]; return; }

  // AGRUPA señales cercanas en zonas de calor
  señales.sort((a,b)=>a.price-b.price);
  const grupos=[];
  for(const s of señales){
    const g=grupos.find(x=>Math.abs(x.price-s.price)<=tol);
    if(g){ g.calor+=s.peso; g.tipos.add(s.tipo);
      g.price=(g.price*g.n+s.price)/(g.n+1); g.n++; }
    else grupos.push({price:s.price, calor:s.peso, tipos:new Set([s.tipo]), n:1});
  }
  // clasifica short (arriba) / long (abajo) y ordena por calor
  grupos.forEach(g=>{ g.lado = g.price>price? "short":"long";
    g.fuentes=g.tipos.size; });   // cuántas señales DISTINTAS coinciden = calidad
  grupos.sort((a,b)=>b.calor-a.calor);
  // solo las zonas realmente calientes (2+ señales distintas O calor alto)
  const fuertes=grupos.filter(g=>g.fuentes>=2 || g.calor>=2.5);
  state.heatZones=fuertes.slice(0,8);
}

/* ---- ZONAS DE REACCIÓN: donde el precio rechazó fuerte antes (liquidez REAL probada) ---- */
function computeReactZones(){
  const c=state.candles, N=c.length; if(N<10){ state.reactZones=[]; return; }
  const price=state.livePrice||c[N-1].c;
  // ATR aproximado para medir qué mecha es "grande"
  let atr=0; for(let i=Math.max(1,N-50);i<N;i++) atr+=(c[i].h-c[i].l); atr/=Math.min(50,N-1);
  const zonas=[];
  const W=3;   // pivote: máximo/mínimo local en ±3 velas
  for(let i=W;i<N-W;i++){
    const k=c[i];
    // ¿es un swing high? (máximo local) con MECHA SUPERIOR grande = rechazo real
    let esHigh=true, esLow=true;
    for(let d=-W;d<=W;d++){ if(c[i+d].h>k.h)esHigh=false; if(c[i+d].l<k.l)esLow=false; }
    const mechaUp=k.h-Math.max(k.o,k.c);      // mecha superior
    const mechaDn=Math.min(k.o,k.c)-k.l;      // mecha inferior
    // swing high con rechazo: mecha superior ≥ 60% del ATR
    if(esHigh && mechaUp>=atr*0.6){
      const fuerza=mechaUp/atr;
      zonas.push({price:k.h, side:"high", fuerza, toques:1, idx:i});
    }
    if(esLow && mechaDn>=atr*0.6){
      const fuerza=mechaDn/atr;
      zonas.push({price:k.l, side:"low", fuerza, toques:1, idx:i});
    }
  }
  // agrupa zonas cercanas (mismo nivel tocado varias veces = más fuerte)
  const tol=atr*0.5, agrup=[];
  zonas.sort((a,b)=>b.fuerza-a.fuerza);
  for(const z of zonas){
    const cerca=agrup.find(g=>Math.abs(g.price-z.price)<=tol && g.side===z.side);
    if(cerca){ cerca.toques++; cerca.fuerza=Math.max(cerca.fuerza,z.fuerza); }
    else agrup.push({...z});
  }
  // solo las que NO ha atravesado el precio aún (siguen siendo objetivo)
  // y ordena por fuerza × toques (más rechazos = liquidez más probada)
  agrup.forEach(z=> z.score=z.fuerza*(1+z.toques*0.4));
  agrup.sort((a,b)=>b.score-a.score);
  state.reactZones=agrup.slice(0,6);
}

// detecta las zonas (FIJAS: sobre todo el rango, no cambian al hacer zoom)
function computeZones(prof, gmax, lo, bucket, R){
  const MIN=gmax*0.35, cand=[];            // muros ≥35% del máximo
  for(let r=1;r<R-1;r++){ const v=prof[r]; if(v<=MIN)continue;
    if(v>=prof[r-1] && v>=prof[r+1]) cand.push({row:r, v, price:lo+(r+0.5)*bucket}); }
  cand.sort((a,b)=>b.v-a.v);
  const zones=[]; const sepRows=Math.round(R*0.02);
  for(const z of cand){ if(zones.some(q=>Math.abs(q.row-z.row)<sepRows)) continue;
    zones.push(z); if(zones.length>=CONFIG.topN) break; }
  zones.sort((a,b)=>b.v-a.v);
  // PRIORIDAD REAL: fuerza estimada + cercanía + RESPALDO DE VOLUMEN REAL (VRVP)
  const price=state.livePrice||0;
  const vmax=zones.length? zones[0].v : 1;
  // ¿cuánto volumen real hay cerca de cada zona? (confirma la liquidez estimada con dato duro)
  const volEnZona=zPrice=>{
    if(!state.vp||!state.vpBk) return 0;
    const vlo=state.vpLo, bk=state.vpBk, R2=state.vpRows;
    const rc=Math.floor((zPrice-vlo)/bk);
    let suma=0;
    for(let d=-2;d<=2;d++){ const r=rc+d; if(r>=0&&r<R2) suma+=state.vp[r]; }  // ±2 filas alrededor
    return suma;
  };
  if(price>0){
    // máximo de volumen real entre las zonas (para normalizar)
    let vpZmax=0; zones.forEach(z=>{ const v=volEnZona(z.price); if(v>vpZmax)vpZmax=v; });
    if(vpZmax<=0) vpZmax=1;
    zones.forEach(z=>{
      const dist=Math.abs(z.price-price)/price;
      const fuerza=z.v/vmax;                            // liquidez estimada (0..1)
      const cercania=1/(1+dist*80);
      const volReal=volEnZona(z.price)/vpZmax;          // volumen real cerca (0..1)
      z.volReal=volReal;
      // score = estimado × cercanía, REFORZADO si hay volumen real (dato duro) confirmando
      z.score=fuerza*cercania*(0.55+volReal*0.9);       // hasta +90% si el volumen real la respalda
      z.confirmada = volReal>=0.4;                       // marca zonas con respaldo real fuerte
    });
    const orden=[...zones].sort((a,b)=>b.score-a.score);
    orden.forEach((z,i)=> z.rank=i+1);
  }
  state.zones=zones;
}

/* ---- VRVP: volumen REAL sobre lo que se ve (velas + rango de precio visible) ---- */
function computeVP(){
  const R=state.vpRows, vp=new Float64Array(R);
  const c=state.candles, N=c.length;
  // el perfil se calcula sobre el RANGO DE PRECIO VISIBLE (para que el POC sea el de lo que ves)
  const lo=state.viewLo, hi=state.viewHi, span=(hi-lo)||1, bk=span/R;
  const i0=Math.max(0,Math.floor(state.x0)), i1=Math.min(N-1,Math.ceil(state.x1));
  for(let i=i0;i<=i1;i++){
    const k=c[i]; const kl=Math.max(k.l,lo), kh=Math.min(k.h,hi);   // recorta a lo visible
    if(kh<kl) continue;                                             // vela fuera de la vista
    if(kh<=kl){ const r=Math.floor((k.c-lo)/bk); if(r>=0&&r<R) vp[r]+=k.q; continue; }
    const r0=Math.max(0,Math.floor((kl-lo)/bk));
    const r1=Math.min(R-1,Math.floor((kh-lo)/bk));
    const nr=(r1-r0+1)||1;
    // reparte proporcional a la parte de la vela que cae en la vista
    const frac=(kh-kl)/((k.h-k.l)||1), per=(k.q*Math.min(1,frac))/nr;
    for(let r=r0;r<=r1;r++) vp[r]+=per;
  }
  let mx=0,poc=0; for(let r=0;r<R;r++){ if(vp[r]>mx){mx=vp[r];poc=r;} }
  state.vp=vp; state.vpMax=mx||1; state.vpPoc=poc; state.vpBk=bk; state.vpLo=lo;
}

// tiempo que falta para que cierre la vela actual del TF
function cuentaAtras(){
  const c=state.candles; if(!c.length) return null;
  const dur=CONFIG.tfMs[state.tf]; if(!dur) return null;
  const cierre=c[c.length-1].t + dur;
  let ms=cierre-Date.now(); if(ms<0) ms=0;
  const h=Math.floor(ms/3600000), m=Math.floor(ms%3600000/60000), s=Math.floor(ms%60000/1000);
  if(h>0) return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  return m+":"+String(s).padStart(2,"0");
}

/* ---- PANEL DE OBJETIVOS: lo que el precio va a buscar, por prioridad ---- */
function updateTargets(){
  const box=$("#targets"); if(!box) return;
  const zs=state.zones;
  if(!zs || !zs.length || !state.livePrice){ box.innerHTML=""; return; }
  const price=state.livePrice;
  const ref=Math.max(...zs.map(z=>z.v))||1;
  // prioridad = mucha liquidez + cerca del precio (+ respaldo de volumen real)
  let scored=zs.map(z=>{
    const dist=Math.abs(z.price-price)/price*100;
    const fuerza=z.v/ref;
    const cercania=1/(1+dist*0.65);
    const bonus=z.confirmada?1.35:1;                    // las ✓vol pesan más
    return {...z, dist:(z.price-price)/price*100, sc:fuerza*cercania*bonus};
  }).filter(z=>Math.abs(z.dist)>0.05)
    .sort((a,b)=>b.sc-a.sc)
    .slice(0,8);
  if(!scored.length){ box.innerHTML=""; return; }
  const maxV=Math.max(...scored.map(z=>z.v));
  let h=`<div class="tt">🎯 objetivos · lo que el precio busca</div>`;
  h+=`<div class="cp">Precio actual: ${fmt(price)}</div>`;
  scored.forEach((z,i)=>{
    const up=z.price>price, isStar=(z.v===maxV);
    h+=`<div class="row${i===0?' main':''}">`
      +`<span class="rk">${isStar?"★":(i+1)}</span>`
      +`<span class="ar ${up?'up':'dn'}">${up?'▲':'▼'}</span>`
      +`<span class="pr">${fmt(z.price)}</span>`
      +`<span class="am">${usd(z.v)}${z.confirmada?" ✓":""}</span>`
      +`<span class="ds ${up?'up':'dn'}">${z.dist>=0?'+':''}${z.dist.toFixed(1)}%</span>`
      +`</div>`;
  });
  box.innerHTML=h;
}

/* ---- RENDER ---- */
function resize(){
  const dpr=Math.min(devicePixelRatio||1,2);
  cv.width=cv.clientWidth*dpr; cv.height=cv.clientHeight*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  buf.forEach((b,i)=>{b.width=cv.width;b.height=cv.height;bx[i].setTransform(dpr,0,0,dpr,0,0);});
}
function layout(){
  const w=cv.clientWidth,h=cv.clientHeight;
  const L={w,h,top:14,bottom:h-26,left:10};
  L.right = Math.round(w*0.80);          // heatmap + velas
  L.axisX = L.right+2;
  L.profL = Math.round(w*0.86);          // panel derecho: liquidez
  L.profR = w-10;
  L.plotH=L.bottom-L.top; L.plotW=L.right-L.left; L.profW=L.profR-L.profL;
  state.layout=L; return L;
}
const yOf=p=>{const L=state.layout;return L.top+(1-(p-state.viewLo)/(state.viewHi-state.viewLo))*L.plotH;};
const pOf=y=>{const L=state.layout;return state.viewLo+(1-(y-L.top)/L.plotH)*(state.viewHi-state.viewLo);};

// paleta simple y clara
function heat(t){
  if(t<=0.02) return null;
  const S=[[0.02,[16,24,40,0]],[0.25,[26,90,104,.45]],[0.5,[42,181,165,.7]],
           [0.75,[143,212,110,.85]],[1,[255,225,90,1]]];
  for(let i=1;i<S.length;i++){ if(t<=S[i][0]){
    const a=S[i-1],b=S[i],f=(t-a[0])/(b[0]-a[0]),c0=a[1],c1=b[1];
    return `rgba(${c0[0]+(c1[0]-c0[0])*f|0},${c0[1]+(c1[1]-c0[1])*f|0},${c0[2]+(c1[2]-c0[2])*f|0},${c0[3]+(c1[3]-c0[3])*f})`;
  }} return "rgba(255,235,120,1)";
}

function render(){
  if(!state.grid) return;
  const L=layout(), bi=cur^1, o=bx[bi];
  o.fillStyle="#0a0e17"; o.fillRect(0,0,L.w,L.h);
  const N=state.grid.length, R=CONFIG.rows;
  const x0=state.x0, x1=state.x1, cw=L.plotW/((x1-x0+1)||1);
  const xAt=i=>L.left+(i-x0)*cw;
  const i0=Math.max(0,Math.floor(x0)), i1=Math.min(N-1,Math.ceil(x1));

  // heatmap (solo la parte visible) — se puede ocultar con el botón 🌡 Fondo
  if(state.showHeatmap){
  o.save(); o.beginPath(); o.rect(L.left,L.top,L.plotW,L.plotH); o.clip();
  for(let r=0;r<R;r++){
    const yT=yOf(state.lo+(r+1)*state.bucket), yB=yOf(state.lo+r*state.bucket);
    if(yB<L.top||yT>L.bottom) continue;
    for(let i=i0;i<=i1;i++){ const v=state.grid[i][r]; if(v<=0)continue;
      const col=heat(Math.pow(v/state.gridMax,CONFIG.gamma)); if(!col)continue;
      o.fillStyle=col; o.fillRect(xAt(i), yT, cw+0.6, (yB-yT)+0.6); }
  }
  o.restore();
  }

  // ---- VRVP SUPERPUESTO (volumen real, sombreado desde la izquierda) ----
  if(state.showVP){
    computeVP();
    o.save(); o.beginPath(); o.rect(L.left,L.top,L.plotW,L.plotH); o.clip();
    const vp=state.vp, vmax=state.vpMax, R2=state.vpRows, bk=state.vpBk, vlo=state.vpLo;
    const maxW=L.plotW*0.32;                 // ancho máx del perfil (32% del gráfico)
    for(let r=0;r<R2;r++){ const v=vp[r]; if(v<=0)continue;
      const p=vlo+(r+0.5)*bk, y=yOf(p);
      if(y<L.top-1||y>L.bottom+1)continue;
      const rh=Math.max(L.plotH*bk/(state.viewHi-state.viewLo),0.6);
      const len=(v/vmax)*maxW;
      // color sobrio (azul apagado, poca opacidad) para NO tapar las etiquetas de la izquierda
      const t=v/vmax;
      o.fillStyle= r===state.vpPoc? "rgba(255,180,40,.7)"
        : `rgba(58,${Math.round(96+t*54)},${Math.round(140+t*45)},${0.16+t*0.22})`;
      o.fillRect(L.left, y-rh/2, len, Math.max(rh,0.7));
    }
    o.restore();
    // línea POC (punteada corta, bien visible)
    const pocP=vlo+(state.vpPoc+0.5)*bk, pocY=yOf(pocP);
    if(pocY>=L.top&&pocY<=L.bottom){
      o.strokeStyle="#ffb428"; o.lineWidth=2; o.setLineDash([8,6]);
      o.beginPath(); o.moveTo(L.left,pocY); o.lineTo(L.right,pocY); o.stroke(); o.setLineDash([]);
      // etiqueta POC a la DERECHA (sobre el eje de precio)
      o.font="bold 11px Segoe UI"; const txt="POC "+fmt(pocP);
      const tw=o.measureText(txt).width;
      o.fillStyle="#ffb428"; o.fillRect(L.axisX+2, pocY-11, tw+12, 22);
      o.fillStyle="#1a0f00"; o.textAlign="left"; o.textBaseline="middle";
      o.fillText(txt, L.axisX+8, pocY);
    }
  }

  // velas
  if(state.showCandles){
    o.save(); o.beginPath(); o.rect(L.left,L.top,L.plotW,L.plotH); o.clip();
    const bw=Math.max(cw*0.62,1);
    for(let i=i0;i<=i1;i++){ const k=state.candles[i]; if(!k)continue;
      const x=xAt(i)+cw/2;
      const up=k.c>=k.o, yH=yOf(k.h), yL=yOf(k.l), yO=yOf(k.o), yC=yOf(k.c);
      o.strokeStyle="rgba(0,0,0,.75)"; o.lineWidth=Math.min(bw,3);
      o.beginPath(); o.moveTo(x,yH); o.lineTo(x,yL); o.stroke();
      o.strokeStyle=up?"#7dffc4":"#ffb3c0"; o.lineWidth=1;
      o.beginPath(); o.moveTo(x,yH); o.lineTo(x,yL); o.stroke();
      const bt=Math.min(yO,yC), bh=Math.max(Math.abs(yC-yO),1.2);
      o.fillStyle=up?"#12d97a":"#ff3b57"; o.fillRect(x-bw/2,bt,bw,bh);
      if(bw>2.2){ o.strokeStyle="rgba(0,0,0,.8)"; o.lineWidth=0.9; o.strokeRect(x-bw/2,bt,bw,bh); }
    }
    o.restore();
  }

  // ---- ZONAS DE CALOR INSTITUCIONALES (liquidez agrupada: short arriba / long abajo) ----
  if(state.showHeat && state.heatZones && state.heatZones.length){
    const maxCalor=Math.max(...state.heatZones.map(z=>z.calor));
    o.textBaseline="middle";
    for(const z of state.heatZones){
      const y=yOf(z.price); if(y<L.top+8||y>L.bottom-8) continue;
      const t=z.calor/maxCalor;                          // intensidad 0..1
      const banda=Math.max(6, t*22);                     // grosor de la banda según calor
      const short=z.lado==="short";
      // banda de calor con degradado (rojo=short/resistencia, verde=long/soporte)
      const r=short?255:18, g=short?59:217, b=short?87:124;
      o.fillStyle=`rgba(${r},${g},${b},${0.10+t*0.28})`;
      o.fillRect(L.left, y-banda/2, L.plotW, banda);
      // línea central más intensa
      o.strokeStyle=`rgba(${r},${g},${b},${0.5+t*0.5})`;
      o.lineWidth=1+t*2.5; o.setLineDash([]);
      o.beginPath(); o.moveTo(L.left,y); o.lineTo(L.right,y); o.stroke();
      // etiqueta de CALOR (a la izquierda-centro, con el nº de señales destacado)
      const lab="🔥"+(short?"SHORT":"LONG")+" "+fmt(z.price);
      o.font="bold 10px Segoe UI"; const tw=o.measureText(lab).width;
      const bx=L.left+L.plotW*0.30;                    // posición: 30% desde la izquierda
      o.fillStyle=`rgb(${r},${g},${b})`; o.fillRect(bx, y-9, tw+34, 18);
      o.fillStyle="#0a0e17"; o.textAlign="left"; o.textBaseline="middle";
      o.fillText(lab, bx+5, y);
      // el nº de señales en un círculo destacado al final
      o.fillStyle="rgba(10,14,23,.9)"; o.beginPath(); o.arc(bx+tw+18, y, 9, 0, 7); o.fill();
      o.strokeStyle=`rgb(${r},${g},${b})`; o.lineWidth=1.5; o.stroke();
      o.fillStyle=`rgb(${r},${g},${b})`; o.font="bold 12px Segoe UI"; o.textAlign="center";
      o.fillText(String(z.fuentes), bx+tw+18, y); o.textAlign="left";
    }
  }

  // ---- ZONAS DE REACCIÓN PROBADA (donde el precio rechazó fuerte antes) ----
  if(state.showReact && state.reactZones && state.reactZones.length){
    o.textBaseline="middle";
    for(const z of state.reactZones){
      const y=yOf(z.price); if(y<L.top+6||y>L.bottom-6) continue;
      const col = z.side==="high" ? "#e879f9" : "#22d3ee";   // rosa=techo probado, cyan=suelo probado
      o.strokeStyle=col; o.globalAlpha=0.8; o.lineWidth=z.toques>1?2:1.3;
      o.setLineDash([2,3]);
      o.beginPath(); o.moveTo(L.left,y); o.lineTo(L.right,y); o.stroke();
      o.setLineDash([]); o.globalAlpha=1;
      // etiqueta: precio + nº de veces que rechazó
      const txt=fmt(z.price)+(z.toques>1?"  ×"+z.toques:"")+" ⟲";
      o.font="bold 9px Segoe UI"; const tw=o.measureText(txt).width;
      o.fillStyle=col; o.fillRect(L.left+4, y-7, tw+8, 14);
      o.fillStyle="#0a0e17"; o.textAlign="left"; o.fillText(txt, L.left+8, y);
    }
  }

  // ---- ZONAS DE LIQUIDEZ REAL DEL LIBRO (liquidez acumulada por nivel) ----
  // los muros se ven en TF cortos y medios; solo en 1d se ocultan (rango demasiado amplio)
  const bookTfOk = state.tf!=="1d";
  if(state.showBook && bookTfOk && state.bookWalls && state.bookWalls.length){
    const maxUsd=Math.max(...state.bookWalls.map(w=>w.usd));
    // ⭐ solo para la MAYOR liquidez de cada lado (1 short arriba + 1 long abajo)
    let starBid=null, starAsk=null;
    for(const w of state.bookWalls){
      if(w.side==="bid" && (!starBid || w.usd>starBid.usd)) starBid=w;
      if(w.side==="ask" && (!starAsk || w.usd>starAsk.usd)) starAsk=w;
    }
    o.textBaseline="middle";
    for(const w of state.bookWalls){
      const y=yOf(w.price); if(y<L.top+6||y>L.bottom-6) continue;
      const fuerte=w.usd>=maxUsd*0.6;
      const gigante = (w===starBid || w===starAsk);   // la mayor de su lado
      const col = w.side==="bid" ? "#12d97a" : "#ff3b57";
      o.strokeStyle=col; o.globalAlpha=(fuerte||gigante)?0.95:0.55;
      o.lineWidth=gigante?3.2:(fuerte?2.6:1.4); o.setLineDash([]);
      o.beginPath(); o.moveTo(L.left,y); o.lineTo(L.right,y); o.stroke();
      o.globalAlpha=1;
      const icono = gigante? "⭐🐋" : "🐋";
      const txt=icono+" "+fmt(w.price)+"  "+usd(w.usd)+"  ("+w.ordenes+" órd)";
      o.font="bold 9.5px Segoe UI"; const tw=o.measureText(txt).width;
      o.fillStyle=col; o.fillRect(L.left+4, y-8, tw+10, 16);
      o.fillStyle="#0a0e17"; o.textAlign="left"; o.fillText(txt, L.left+9, y);
    }
  } else if(state.showBook && bookTfOk && state.bookErr){
    // estado del libro: naranja si es error de red, gris si solo no hay muros
    const esError = state.bookErr.includes("conexión")||state.bookErr.includes("HTTP");
    o.fillStyle=esError? "rgba(255,120,50,.95)":"rgba(125,140,165,.85)";
    o.font="bold 10px Segoe UI"; o.textAlign="left"; o.textBaseline="top";
    o.fillText("🐋 "+state.bookErr, L.left+8, L.top+4);
  }

  // ZONAS MACRO (temporalidad mayor, ej. 4h): líneas violeta punteadas
  if(state.showHTF && state.htfZones && state.htfZones.length){
    o.setLineDash([6,4]); o.lineWidth=1.2; o.textBaseline="middle";
    for(const z of state.htfZones){
      const y=yOf(z.price); if(y<L.top+6||y>L.bottom-6) continue;
      o.strokeStyle="rgba(168,85,247,.7)";
      o.beginPath(); o.moveTo(L.left,y); o.lineTo(L.right,y); o.stroke();
      // etiqueta violeta a la izquierda
      const txt=(state.htfTf||"4h")+" · "+fmt(z.price);
      o.font="bold 9px Segoe UI"; const tw=o.measureText(txt).width;
      o.fillStyle="rgba(60,25,90,.92)"; o.fillRect(L.left+4, y-8, tw+8, 15);
      o.fillStyle="#d8b4fe"; o.textAlign="left"; o.fillText(txt, L.left+8, y);
    }
    o.setLineDash([]);
  }

  // ZONAS: línea clara + etiqueta, color según FUERZA (imán = más fuerte)
  const used=[];
  if(state.showZones){
  o.textBaseline="middle";
  const zmax=state.zones.length? state.zones[0].v : 1;
  // color por fuerza: rojo=clave, naranja=alta, amarillo=media
  const zoneColor=v=>{ const r=v/zmax;
    return r>=0.75? "#ff5b6e" : r>=0.5? "#ff9c2e" : "#ffe15a"; };
  // --- CONFLUENCIA: según el modo elegido (las 3, 2 de 3, zona+POC, zona+4h) ---
  const pocPrice = state.vp? (state.vpLo+(state.vpPoc+0.5)*state.vpBk) : null;
  const tolC = 0.004;   // tolerancia 0.4% para considerar "mismo nivel"
  const esConfluencia=z=>{
    const M=state.confMode;
    if(M==="off") return false;
    const cercaPOC = pocPrice!=null && Math.abs(z.price-pocPrice)/z.price <= tolC;
    const cercaMacro = state.showHTF && state.htfZones &&
      state.htfZones.some(h=>Math.abs(z.price-h.price)/z.price <= tolC);
    if(M==="poc")   return cercaPOC;                    // zona + POC
    if(M==="macro") return cercaMacro;                  // zona + 4h
    if(M==="2")     return cercaPOC || cercaMacro;      // 2 de 3 (la zona ya cuenta)
    return cercaPOC && cercaMacro;                      // "3": las tres
  };
  state.zones.forEach((z,i)=>{
    const y=yOf(z.price); if(y<L.top+8||y>L.bottom-8) return;
    const crowded=used.some(u=>Math.abs(u-y)<20);
    used.push(y);
    const col=zoneColor(z.v), r=z.v/zmax, strong=r>=0.75;
    const conf=esConfluencia(z);
    // marco brillante si es confluencia (zona + POC + macro)
    if(conf){
      o.strokeStyle="#00e5ff"; o.globalAlpha=1; o.lineWidth=3; o.setLineDash([]);
      o.shadowColor="#00e5ff"; o.shadowBlur=12;
      o.beginPath(); o.moveTo(L.left,y); o.lineTo(L.right,y); o.stroke();
      o.shadowBlur=0;
    }
    // línea sólida y más gruesa cuanto más fuerte la zona
    o.strokeStyle=col; o.globalAlpha=strong?0.95:0.7;
    o.lineWidth= strong?2.2 : r>=0.5?1.6:1.1; o.setLineDash([]);
    o.beginPath(); o.moveTo(L.left,y); o.lineTo(L.right,y); o.stroke();
    o.globalAlpha=1;
    if(crowded) return;
    // etiqueta con el color de la zona + número de prioridad
    const w=104, hh=23;
    // marco brillante alrededor de la etiqueta si es confluencia
    if(conf){ o.strokeStyle="#00e5ff"; o.lineWidth=2; o.shadowColor="#00e5ff"; o.shadowBlur=8;
      o.strokeRect(L.axisX, y-hh/2-1, w+4, hh+2); o.shadowBlur=0; }
    o.fillStyle=col; o.fillRect(L.axisX+2, y-hh/2, w, hh);
    o.textAlign="left";
    // círculo de prioridad
    if(z.rank){
      o.fillStyle="rgba(10,14,23,.85)"; o.beginPath(); o.arc(L.axisX+13, y, 8, 0, 7); o.fill();
      o.fillStyle=col; o.font="bold 11px Segoe UI"; o.textAlign="center"; o.textBaseline="middle";
      o.fillText(z.rank, L.axisX+13, y); o.textAlign="left";
    }
    o.fillStyle="#0a0e17"; o.font="bold 12px Segoe UI"; o.textBaseline="middle";
    o.fillText(fmt(z.price), L.axisX+26, y-5);
    o.fillStyle="rgba(10,14,23,.78)"; o.font="bold 9.5px Segoe UI";
    // ✓ si el volumen real confirma la zona (dato duro respaldando lo estimado)
    o.fillText(usd(z.v)+(z.confirmada?"  ✓vol":""), L.axisX+26, y+7);
    // etiqueta "CONFLUENCIA" encima (indica de qué tipo)
    if(conf){ const M=state.confMode;
      const txtC = M==="3"? "★ CONFLUENCIA · POC+4h"
                 : M==="poc"? "★ ZONA + POC"
                 : M==="macro"? "★ ZONA + 4h" : "★ CONFLUENCIA";
      o.fillStyle="#00e5ff"; o.font="bold 8px Segoe UI"; o.textAlign="left";
      o.fillText(txtC, L.axisX+2, y-hh/2-7); }
  });
  }

  // eje de precio
  o.font="10px Segoe UI"; o.textAlign="left"; o.fillStyle="#5a6b82";
  o.strokeStyle="rgba(255,255,255,.04)"; o.lineWidth=1;
  for(let s=0;s<=6;s++){ const p=state.viewLo+(state.viewHi-state.viewLo)*s/6, y=yOf(p);
    if(used.some(u=>Math.abs(u-y)<16)) continue;
    o.beginPath(); o.moveTo(L.left,y); o.lineTo(L.right,y); o.stroke();
    o.fillText(fmt(p), L.axisX+7, y); }

  // eje de tiempo
  o.textAlign="center"; o.textBaseline="top"; o.fillStyle="#4d5b70";
  for(let s=0;s<=5;s++){ const i=Math.round(x0+(x1-x0)*s/5), k=state.candles[Math.max(0,Math.min(N-1,i))];
    const d=new Date(k.t);
    const lab=(state.tf==="3d"||state.tf==="1w")?`${d.getDate()}/${d.getMonth()+1}`
      :`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    o.fillText(lab, Math.min(Math.max(xAt(i),L.left+16),L.right-16), L.bottom+5); }

  // ===== DERECHA: LIQUIDEZ estimada (perfil real) =====
  const price=state.livePrice||state.candles[N-1].c;
  const rowH=Math.max(L.plotH*state.bucket/(state.viewHi-state.viewLo),0.8);
  o.fillStyle="#080c14"; o.fillRect(L.profL-4,L.top-2,L.profW+8,L.plotH+4);
  o.save(); o.beginPath(); o.rect(L.profL-4,L.top,L.profW+8,L.plotH); o.clip();
  const prof=state.profile; let pmax=0; for(const v of prof) if(v>pmax)pmax=v; if(pmax<=0)pmax=1;
  const bw2=L.profW*0.86;
  for(let r=0;r<CONFIG.rows;r++){ const v=prof[r]; if(v<=0)continue;
    const p=state.lo+(r+0.5)*state.bucket, y=yOf(p);
    if(y<L.top-2||y>L.bottom+2)continue;
    const len=(v/pmax)*bw2;
    const above=p>price;
    o.fillStyle= above? "rgba(45,195,205,.5)":"rgba(235,65,85,.45)";
    o.fillRect(L.profL, y-rowH/2, len, Math.max(rowH*0.88,0.8));
  }
  // zonas principales resaltadas
  state.zones.forEach((z,i)=>{
    const y=yOf(z.price); if(y<L.top||y>L.bottom)return;
    const len=Math.max((z.v/pmax)*bw2,4);
    o.fillStyle= i===0? "#ffb428":"rgba(255,225,120,.9)";
    o.fillRect(L.profL, y-rowH/2, len, Math.max(rowH,2.5));
  });
  o.restore();
  o.fillStyle="#5a6b82"; o.font="9.5px Segoe UI"; o.textAlign="left"; o.textBaseline="top";
  o.fillText("LIQUIDEZ", L.profL, L.top-0.5);

  updateTargets();
  staticCv=buf[bi]; cur=bi;
}

function frame(){
  if(!staticCv){ ctx.fillStyle="#0a0e17"; ctx.fillRect(0,0,cv.clientWidth,cv.clientHeight);
    ctx.fillStyle="#5a6b82"; ctx.font="12px Segoe UI"; ctx.textAlign="center";
    ctx.fillText("cargando…",cv.clientWidth/2,cv.clientHeight/2); ctx.textAlign="left";
    requestAnimationFrame(frame); return; }
  const L=state.layout;
  ctx.drawImage(staticCv,0,0,cv.width,cv.height,0,0,L.w,L.h);

  // precio actual
  if(state.livePrice){ const y=yOf(state.livePrice);
    if(y>=L.top&&y<=L.bottom){
      ctx.strokeStyle="rgba(55,192,255,.9)"; ctx.lineWidth=1.2; ctx.setLineDash([5,4]);
      ctx.beginPath(); ctx.moveTo(L.left,y); ctx.lineTo(L.profR,y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle="#0b2233"; ctx.fillRect(L.axisX+2,y-9,84,18);
      ctx.fillStyle="#37c0ff"; ctx.font="bold 11px Segoe UI"; ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(fmt(state.livePrice), L.axisX+7, y);
      // cuenta atrás del cierre de la vela actual
      const ca=cuentaAtras();
      if(ca){ ctx.fillStyle="#0b2233"; ctx.fillRect(L.axisX+2, y+10, 84, 14);
        ctx.fillStyle="#7d8ca5"; ctx.font="bold 9.5px Segoe UI";
        ctx.fillText("⏱ "+ca+" · "+state.tf, L.axisX+7, y+17); }
    }
  }
  // crosshair
  if(state.hover!=null){ const y=state.hover;
    ctx.strokeStyle="rgba(255,255,255,.25)"; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(L.left,y); ctx.lineTo(L.profR,y); ctx.stroke(); ctx.setLineDash([]);
  }
  requestAnimationFrame(frame);
}

/* ---- TOOLTIP ---- */
let drag=false,dY=0,dX=0;
cv.addEventListener("mousemove",e=>{
  if(!state.profile||drag){return;}
  const L=state.layout, r=cv.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  if(my<L.top||my>L.bottom||mx<L.left||mx>L.profR){ state.hover=null; $("#tip").style.display="none"; return; }
  const row=Math.floor((pOf(my)-state.lo)/state.bucket);
  const bv = (row>=0 && row<CONFIG.rows) ? state.profile[row] : 0;
  const br=row;
  // usa el MISMO cálculo que el heatmap: si ahí no se pinta color, no hay tooltip
  const shade = Math.pow(bv/state.gridMax, CONFIG.gamma);
  if(br<0||br>=CONFIG.rows||shade<0.12){ state.hover=null; $("#tip").style.display="none"; return; }
  const t=bv/state.gridMax;
  state.hover=my;
  const price=state.lo+(br+0.5)*state.bucket;
  const z=state.zones.find(q=>Math.abs(q.row-br)<=2);
  const tip=$("#tip");
  tip.innerHTML=`<div class="tp">${z? (state.zones.indexOf(z)===0?"★ Zona principal":"Zona #"+(state.zones.indexOf(z)+1)) : "Liquidez"}</div>`
    +`<div class="tr"><small>Precio</small><b>${fmt(price)}</b></div>`
    +`<div class="tr"><small>Liquidez estimada</small><b style="color:#ffd75c">${usd(bv)}</b></div>`
    +`<div class="tr"><small>Distancia</small><b>${((price-state.livePrice)/state.livePrice*100).toFixed(2)}%</b></div>`;
  tip.style.display="block";
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let tx=mx+16; if(tx+tw>L.w-6)tx=mx-tw-16;
  let ty=my-th/2; if(ty<4)ty=4; if(ty+th>L.h-6)ty=L.h-th-6;
  tip.style.left=tx+"px"; tip.style.top=ty+"px";
});
cv.addEventListener("mouseleave",()=>{state.hover=null;$("#tip").style.display="none";});

/* ---- WS ---- */
function connectWS(){
  if(state.ws){try{state.ws.onclose=null;state.ws.close();}catch(e){}}
  const s=state.symbol.toLowerCase();
  const iv=state.klineIv||"3m";
  const ws=new WebSocket(`${CONFIG.ws}${s}@kline_${iv}`);
  state.ws=ws;
  ws.onopen=()=>{ state.lastWsMsg=Date.now(); setStatus("en vivo · "+nm(state.symbol),"ok"); };
  ws.onmessage=e=>{ state.lastWsMsg=Date.now(); let m; try{m=JSON.parse(e.data);}catch(_){return;}
    const k=m.data&&m.data.k; if(!k)return;
    const c=state.candles,last=c[c.length-1];
    if(k.t===last.t){ last.h=+k.h;last.l=+k.l;last.c=+k.c;last.q=+k.q;last.tb=+k.Q; }
    else if(k.t>last.t){ c.push({t:k.t,o:+k.o,h:+k.h,l:+k.l,c:+k.c,q:+k.q,tb:+k.Q}); c.shift(); state.need=true; }
    state.livePrice=+k.c; $("#price b").textContent=fmt(state.livePrice);
  };
  ws.onclose=()=>{ if(state.ws!==ws)return; state.ws=null; setStatus("reconectando…","");
    setTimeout(connectWS,2500); };
}

/* ---- CICLO ---- */
/* ---- ZONAS MACRO (temporalidad mayor, ej. 4h) ---- */
function calcHtfZones(cands){
  if(!cands||!cands.length) return [];
  const N=cands.length, R=180, levs=state.levs;
  let lo=Infinity,hi=-Infinity;
  for(const k of cands){ if(k.l<lo)lo=k.l; if(k.h>hi)hi=k.h;
    for(const L of levs){ const dl=k.c*(1-1/L),sl=k.c*(1+1/L); if(dl<lo)lo=dl; if(sl>hi)hi=sl; } }
  const pad=(hi-lo)*0.015; lo-=pad; hi+=pad; const bucket=(hi-lo)/R;
  const rowOf=p=>{ const r=Math.floor((p-lo)/bucket); return (r<0||r>=R)?-1:r; };
  const LEVSHARE={10:0.35,25:0.30,50:0.22,100:0.13}, OF=CONFIG.openFrac;
  const grid=Array.from({length:N},()=>new Float64Array(R));
  let live=[];
  for(let i=0;i<N;i++){ const k=cands[i], keep=[];
    for(const a of live){ if(a.p>=k.l&&a.p<=k.h){ if(a.r>=0) for(let j=a.s;j<=i;j++) grid[j][a.r]+=a.v; } else keep.push(a); }
    live=keep;
    let lf=(k.q>0)?(k.tb||0)/k.q:0.5; lf=Math.max(0,Math.min(1,lf));
    const nuevo=k.q*OF;
    for(const L of levs){ const share=LEVSHARE[L]||0.25, dl=k.c*(1-1/L),sl=k.c*(1+1/L);
      live.push({r:rowOf(dl),p:dl,v:nuevo*lf*share,s:i});
      live.push({r:rowOf(sl),p:sl,v:nuevo*(1-lf)*share,s:i}); } }
  for(const a of live){ if(a.r>=0) for(let j=a.s;j<N;j++) grid[j][a.r]+=a.v; }
  const prof=new Float64Array(R); let gmax=0;
  for(let r=0;r<R;r++){ let mx=0; for(let i=0;i<N;i++){const v=grid[i][r]; if(v>mx)mx=v;} prof[r]=mx; if(mx>gmax)gmax=mx; }
  // picos macro fuertes y separados
  const MIN=gmax*0.35, cand=[];
  for(let r=1;r<R-1;r++){ const v=prof[r]; if(v<=MIN)continue;
    if(v>=prof[r-1]&&v>=prof[r+1]) cand.push({price:lo+(r+0.5)*bucket, v, row:r}); }
  cand.sort((a,b)=>b.v-a.v);
  const zones=[]; const sep=Math.round(R*0.025);
  for(const z of cand){ if(zones.some(q=>Math.abs(q.row-z.row)<sep))continue; zones.push(z); if(zones.length>=5)break; }
  return zones;
}
async function fetchHtf(){
  const htf=CONFIG.htfFor[state.tf];
  if(!state.showHTF||!htf){ state.htfZones=[]; state.htfTf=null; return; }
  try{
    const lim=CONFIG.limitByTf[htf]||180;
    const r=await fetch(`${CONFIG.rest}?symbol=${state.symbol}&interval=${htf}&limit=${lim}`);
    if(!r.ok) throw new Error("htf "+r.status);
    const raw=await r.json();
    const cands=raw.map(k=>({o:+k[1],h:+k[2],l:+k[3],c:+k[4],q:+k[7],tb:+k[10]}));
    state.htfZones=calcHtfZones(cands); state.htfTf=htf;
  }catch(e){ state.htfZones=[]; state.htfTf=null; }
}

// recarga SOLO velas/zonas al cambiar TF — NO toca el libro de órdenes (no depende del TF)
async function reloadTf(){
  setStatus("cargando…","");
  state.userZoom=false; state.viewLo=null; state.viewHi=null; state.x0=null; state.x1=null;
  try{ await fetchData(); $("#price b").textContent=fmt(state.livePrice);
    compute(); render(); fetchHtf().then(render); connectWS();
    // el libro (WS depth) sigue vivo — solo re-procesa lo que ya tiene
    if(state.bookRaw) procesarBook();
  }catch(e){ setStatus("error: "+(e.message||e),"err"); console.error(e); }
}

async function reload(){
  setStatus("cargando…","");
  state.userZoom=false; state.viewLo=null; state.viewHi=null; state.x0=null; state.x1=null;
  state.lsBuy=0; state.lsSell=0; state.lsLive=false;
  state.bookTracked=[]; state.bookWalls=[];   // reinicia el seguimiento de muros al cambiar par
  state.depthBook={bids:new Map(), asks:new Map()};   // reinicia el libro del WS
  try{ await fetchData(); $("#price b").textContent=fmt(state.livePrice);
    compute(); render(); pollLS(); fetchHtf().then(render); fetchBook().then(render); connectWS(); connectDepthWs(); }
  catch(e){
    const local = location.protocol==="file:";
    // muestra el error REAL para diagnosticar
    setStatus((local?"[file://] ":"")+"error: "+(e.message||e), "err");
    console.error("Fallo al cargar velas:", e);
  }
}
// recalcula solo al cerrar vela o cada 30s (nada de saltos)
setInterval(()=>{ if(state.need){ compute(); render(); state.need=false; } },1000);
setInterval(()=>{ if(state.candles.length){ compute(); render(); } },30000);
setInterval(pollLS,1000);      // datos taker reales
setInterval(updateLS,400);     // barra en vivo
setInterval(()=>{ if(state.showBook) fetchBook().then(render); }, 2000);   // liquidez del libro acumulada
// RESPALDO: re-sincroniza velas por REST cada 20s (por si el WS se cae, no se congela)
setInterval(refreshCandles, 20000);
// VIGILANTE: si el WS lleva >30s sin mensajes, lo reconecta
setInterval(()=>{
  if(state.lastWsMsg && Date.now()-state.lastWsMsg>30000){
    setStatus("reconectando…",""); connectWS();
  }
}, 10000);
addEventListener("resize",()=>{resize();if(state.grid)render();});

/* ---- RESPALDO: trae velas frescas por REST (mantiene vivo aunque el WS muera) ---- */
async function refreshCandles(){
  if(!state.candles.length) return;
  try{
    const lim=CONFIG.limitByTf[state.tf]||240;
    const r=await fetch(`${CONFIG.rest}?symbol=${state.symbol}&interval=${state.tf}&limit=${lim}`);
    if(!r.ok) return;
    const raw=await r.json();
    state.candles=raw.map(k=>({t:k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],q:+k[7],tb:+k[10]}));
    state.livePrice=state.candles[state.candles.length-1].c;
    $("#price b").textContent=fmt(state.livePrice);
    state.need=true;   // fuerza recálculo con los datos nuevos
  }catch(e){}
}

/* ---- LARGO / CORTO (volumen taker real, por REST) ---- */
async function pollLS(){
  if(!state.candles.length) return;
  const [iv,lim]=["1m",5];   // presión de los últimos 5 min (inmediata)
  try{
    const r=await fetch(`${CONFIG.rest}?symbol=${state.symbol}&interval=${iv}&limit=${lim}`);
    if(!r.ok) return;
    const raw=await r.json();
    let buy=0,tot=0;
    for(const k of raw){ buy+=+k[10]; tot+=+k[7]; }   // taker buy quote, total quote
    if(tot>0){ state.lsBuy=buy; state.lsSell=tot-buy; state.lsLive=true; state.lsAt=Date.now(); }
    // respaldo del precio en vivo
    const lc=+raw[raw.length-1][4];
    if(lc>0){ state.livePrice=lc; $("#price b").textContent=fmt(lc);
      const c=state.candles, last=c[c.length-1];
      last.c=lc; if(lc>last.h)last.h=lc; if(lc<last.l)last.l=lc; }
  }catch(e){}
}
function updateLS(){
  const buy=state.lsBuy, sell=state.lsSell, tot=buy+sell;
  if(tot<=0) return;
  const lf=buy/tot, sf=1-lf;
  const lb=$("#lsLong"), sb=$("#lsShort");
  lb.style.flexGrow=Math.max(lf,0.001); sb.style.flexGrow=Math.max(sf,0.001);
  lb.textContent=(lf*100).toFixed(1)+"%"; sb.textContent=(sf*100).toFixed(1)+"%";
  $("#lsLongVal").textContent=usd(buy);
  $("#lsShortVal").textContent=usd(sell);
  $("#lsLabel").textContent="Largo / Corto · vol. taker · 5m";
  const fl=$("#lsFlow"), age=Math.round((Date.now()-state.lsAt)/1000);
  if(state.lsLive){ fl.textContent = age<=2? "· en vivo ⚡" : "· hace "+age+"s";
    fl.style.color = age<=2? "#26d67c":"#ffb020"; }
  else { fl.textContent="· cargando…"; fl.style.color="#7d8ca5"; }
  const sk=$("#lsSkew");
  if(lf>=0.5){ sk.textContent="▲ Presión compradora"; sk.style.color="#26d67c"; }
  else { sk.textContent="▼ Presión vendedora"; sk.style.color="#ff5b6e"; }
}

/* ---- ZOOM / PAN ---- */
cv.addEventListener("wheel",e=>{
  if(!state.grid||!state.layout) return;
  e.preventDefault();
  const L=state.layout, N=state.candles.length;
  const delta=Math.abs(e.deltaY)>=Math.abs(e.deltaX)? e.deltaY : e.deltaX;
  if(e.shiftKey || Math.abs(e.deltaX)>Math.abs(e.deltaY)){   // horizontal: acerca las velas
    const L=state.layout, N2=state.candles.length;
    const f=delta>0?1.15:0.87;
    let span=(state.x1-state.x0)*f; span=Math.max(10, Math.min(N2+span*0.15, span));
    // ANCLA a la derecha: la vela actual se queda fija, el gráfico crece hacia la IZQUIERDA
    const pad=span*0.12;                    // hueco fijo a la derecha (vela actual no pegada al borde)
    const b=(N2-1)+pad;
    let a=b-span; if(a<0) a=0;
    state.x0=a; state.x1=b;
    render(); return;
  }
  // vertical: precio
  const my=e.clientY-cv.getBoundingClientRect().top;
  const pAt=pOf(my), f=delta>0?1.12:0.89;
  let lo=pAt-(pAt-state.viewLo)*f, hi=pAt+(state.viewHi-pAt)*f;
  if(lo<state.lo) lo=state.lo; if(hi>state.hi) hi=state.hi;
  const min=(state.hi-state.lo)*0.004;
  if(hi-lo<min){ const c=(lo+hi)/2; lo=c-min/2; hi=c+min/2; }
  state.userZoom=true; state.viewLo=lo; state.viewHi=hi; render();
},{passive:false});

cv.addEventListener("mousedown",e=>{drag=true;dY=e.clientY;dX=e.clientX;cv.style.cursor="grabbing";});
addEventListener("mouseup",()=>{if(drag){drag=false;cv.style.cursor="default";}});
addEventListener("mousemove",e=>{
  if(!drag||!state.grid) return;
  const L=state.layout, N=state.candles.length;
  const dy=(e.clientY-dY)/L.plotH*(state.viewHi-state.viewLo); dY=e.clientY;
  state.viewLo+=dy; state.viewHi+=dy; state.userZoom=true;
  const dx=e.clientX-dX; dX=e.clientX;
  const dc=-dx/L.plotW*(state.x1-state.x0);
  let a=state.x0+dc,b=state.x1+dc;
  const pad=(b-a)*0.12, maxB=(N-1)+pad;
  if(b>maxB){ a-=(b-maxB); b=maxB; } if(a<0){ b-=a; a=0; }
  state.x0=a; state.x1=b;
  render();
});
/* ---- TÁCTIL (tablet / móvil): 1 dedo = mover · 2 dedos = zoom ---- */
let tPrev=null, tPinch=null;
const tDist=(a,b)=>Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
cv.addEventListener("touchstart",e=>{
  if(!state.grid) return;
  if(e.touches.length===1){ tPrev={x:e.touches[0].clientX, y:e.touches[0].clientY}; tPinch=null; }
  else if(e.touches.length===2){
    tPinch={ d:tDist(e.touches[0],e.touches[1]),
             span:state.x1-state.x0, lo:state.viewLo, hi:state.viewHi };
    tPrev=null;
  }
},{passive:true});

cv.addEventListener("touchmove",e=>{
  if(!state.grid||!state.layout) return;
  const L=state.layout, N=state.candles.length;
  // 1 dedo: desplaza (horizontal = tiempo, vertical = precio)
  if(e.touches.length===1 && tPrev){
    e.preventDefault();
    const t=e.touches[0];
    const dy=(t.clientY-tPrev.y)/L.plotH*(state.viewHi-state.viewLo);
    state.viewLo+=dy; state.viewHi+=dy; state.userZoom=true;
    const dx=t.clientX-tPrev.x;
    const dc=-dx/L.plotW*(state.x1-state.x0);
    let a=state.x0+dc, b=state.x1+dc;
    const pad=(b-a)*0.12, maxB=(N-1)+pad;
    if(b>maxB){ a-=(b-maxB); b=maxB; } if(a<0){ b-=a; a=0; }
    state.x0=a; state.x1=b;
    tPrev={x:t.clientX, y:t.clientY};
    render();
  }
  // 2 dedos: pellizco = zoom (horizontal y vertical a la vez)
  else if(e.touches.length===2 && tPinch){
    e.preventDefault();
    const d=tDist(e.touches[0],e.touches[1]);
    const f=tPinch.d/(d||1);                       // separar dedos = acercar
    // horizontal, anclado a la derecha (vela actual fija)
    let span=Math.max(10, Math.min(N*1.2, tPinch.span*f));
    const pad=span*0.12, b=(N-1)+pad;
    let a=b-span; if(a<0) a=0;
    state.x0=a; state.x1=b;
    // vertical, centrado
    const c=(tPinch.lo+tPinch.hi)/2, half=(tPinch.hi-tPinch.lo)/2*f;
    let lo=c-half, hi=c+half;
    if(lo<state.lo) lo=state.lo; if(hi>state.hi) hi=state.hi;
    const min=(state.hi-state.lo)*0.004;
    if(hi-lo<min){ lo=c-min/2; hi=c+min/2; }
    state.viewLo=lo; state.viewHi=hi; state.userZoom=true;
    render();
  }
},{passive:false});

cv.addEventListener("touchend",e=>{
  if(e.touches.length===0){ tPrev=null; tPinch=null;
    // doble toque = resetear vista (como el doble clic en PC)
    const now=Date.now();
    if(now-(state.lastTap||0)<300){
      state.userZoom=false; state.viewLo=null; state.viewHi=null; state.x0=null; state.x1=null;
      compute(); render();
    }
    state.lastTap=now;
  }
  else if(e.touches.length===1){ tPrev={x:e.touches[0].clientX,y:e.touches[0].clientY}; tPinch=null; }
},{passive:true});

cv.addEventListener("dblclick",()=>{
  state.userZoom=false; state.viewLo=null; state.viewHi=null; state.x0=null; state.x1=null;
  compute(); render();   // recalcula la vista inicial centrada
});

try{ buildUI(); resize(); reload(); requestAnimationFrame(frame); }
catch(err){ const s=document.getElementById("stxt");
  if(s){ s.textContent="error inicio: "+err.message; s.parentElement.querySelector(".dot").className="dot err"; }
  console.error(err); }
</script>
